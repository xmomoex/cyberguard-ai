services:

  backend:
    build: .
    container_name: cyberguard_backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - db

    env_file:
      - .env

  db:
    image: postgres:15

    container_name: cyberguard_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberguard

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: